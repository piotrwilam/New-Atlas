# Module 1 Version 1 — Configuration
# All values here are defaults; Cell 1 of the notebook takes precedence.

model_name: "openai/circuit-sparsity"
hf_repo: "CSP-Atlas"
checkpoint_dir: "/content/drive/MyDrive/DATA/CSP-Atlas"

# -------------------------------------------------------------------
# Run modes
# -------------------------------------------------------------------
modes:
  test:
    n_generate: 15
    n_keep: 10
    checkpoint_every: 100
    catastrophic_threshold: 10.0
    ast_nodes: ["For", "If", "ListComp", "Try", "FunctionDef"]
    builtins: ["list", "dict", "int", "ValueError", "range"]

  small:
    n_generate: 75
    n_keep: 50
    checkpoint_every: 100
    catastrophic_threshold: 10.0
    # Uses SMALL_AST and SMALL_BUILTINS from concept_matrix.py

  full:
    n_generate: 150
    n_keep: 100
    checkpoint_every: 50
    catastrophic_threshold: 10.0
    # Uses all AST nodes and builtins discovered at runtime

# -------------------------------------------------------------------
# Variance engine
# -------------------------------------------------------------------
wrapper_weights:
  global: 0.40
  function: 0.30
  method: 0.30

domain_count: 5  # increase to 8-10 for the full run to reduce domain-leakage
